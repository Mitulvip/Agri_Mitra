<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kisan Mitra - AI Farmer Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }
}
</script>
<style>
  .bg-texture {
    background-color: #111827; /* Dark background */
  }
  @keyframes fade-in-up {
    0% {
      opacity: 0;
      transform: translateY(20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .animate-fade-in-up {
    animation: fade-in-up 0.8s ease-out forwards;
  }

  /* Animation for chat messages */
  @keyframes fade-in-slide-up {
    0% {
      opacity: 0;
      transform: translateY(10px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .animate-fade-in-slide-up {
    animation: fade-in-slide-up 0.5s ease-out forwards;
  }

  /* Animation for growing plant loader */
  @keyframes grow-stem {
    from { stroke-dashoffset: 20; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes grow-leaf {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(0); opacity: 0; } /* Delay start */
    100% { transform: scale(1); opacity: 1; }
  }
  .stem {
    stroke-dasharray: 20;
    stroke-dashoffset: 20;
    animation: grow-stem 1.5s ease-in-out infinite alternate;
  }
  .leaf {
    transform-origin: 50% 80%; /* More accurate origin for leaf growth */
    opacity: 0;
    animation: grow-leaf 1.5s ease-in-out infinite alternate;
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-texture">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
